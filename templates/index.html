<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Guess the Number</title>
    <style>
      body {font-family: Arial, sans-serif; background:#f7f4ee; color:#2b260f; display:flex; min-height:100vh; align-items:center; justify-content:center; margin:0;}
      .container {width:min(520px,100%); background:#fff; border:1px solid #d7cab7; border-radius:14px; box-shadow:0 18px 40px rgba(37,32,22,0.12); padding:2rem;}
      h1 {margin-top:0; font-size:2rem;}
      p {line-height:1.5;}
      label, button {display:block; width:100%;}
      input {width:100%; padding:0.85rem 0.9rem; border:1px solid #b9ad96; border-radius:10px; margin-top:0.5rem; margin-bottom:1rem; font-size:1rem;}
      button {background:#5b3c2f; color:#fff; border:none; padding:0.9rem; border-radius:10px; cursor:pointer; font-size:1rem;}
      button:hover {background:#6c4c38;}
      .message {background:#f5eadf; border:1px solid #deccb4; border-radius:10px; padding:1rem; margin-top:1rem; min-height:64px;}
      .status {font-weight:700;}
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Guess the Number</h1>
      <p>Pick a number between 1 and 10, then press Guess.</p>

      <label for="guess-input">Your guess</label>
      <input id="guess-input" type="number" min="1" max="10" placeholder="Enter a number" />
      <button id="guess-button">Guess</button>
      <button id="reset-button" type="button" style="margin-top:0.75rem; background:#9a7d60;">Reset game</button>

      <div class="message" id="result">
        <div class="status">Ready to play.</div>
        <div id="details">Submit a guess to get started.</div>
      </div>
    </div>

    <script>
      const guessInput = document.getElementById('guess-input');
      const guessButton = document.getElementById('guess-button');
      const resetButton = document.getElementById('reset-button');
      const result = document.getElementById('result');
      const details = document.getElementById('details');

      function updateMessage(text) {
        result.querySelector('.status').textContent = text;
      }

      function sendGuess() {
        const guess = Number(guessInput.value);
        fetch('/guess', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({guess})
        })
          .then(response => response.json())
          .then(data => {
            if (data.message) {
              updateMessage(data.message);
            } else {
              updateMessage('No response from server.');
            }
            if (typeof data.attempts !== 'undefined') {
              details.textContent = `Attempts: ${data.attempts}`;
            }
          })
          .catch(err => {
            updateMessage('Error: could not reach the server.');
            details.textContent = err.message;
          });
      }

      function resetGame() {
        fetch('/reset', {method:'POST'})
          .then(response => response.json())
          .then(data => {
            updateMessage('Game reset. Try again!');
            details.textContent = '';
            guessInput.value = '';
          })
          .catch(err => {
            updateMessage('Error: could not reset the game.');
            details.textContent = err.message;
          });
      }

      guessButton.addEventListener('click', sendGuess);
      guessInput.addEventListener('keydown', event => {
        if (event.key === 'Enter') sendGuess();
      });
      resetButton.addEventListener('click', resetGame);
    </script>
  </body>
</html>
